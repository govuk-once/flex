version: 2
updates:
  # Enables version updates for pnpm
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    groups:
      dependencies:
        patterns:
          - "*"
        update-types:
          - "patch"
          - "minor"

  # Enables version updates for github actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    groups:
      dependencies:
        patterns:
          - "*"
        update-types:
          - "patch"
          - "minor"
