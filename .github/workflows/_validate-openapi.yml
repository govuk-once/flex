name: Validate Open API Spec

on:
  workflow_call:
    secrets:
      ROLE_TO_ASSUME:
        description: "AWS deployment role to assume"
        required: true

jobs:
  openapi:
    name: Validate Open API Spec
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write # OIDC for AWS
      contents: read
    env:
      OVERRIDE: ${{ contains(github.event.pull_request.labels.*.name, 'breaking-change-accepted') }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate OpenAPI docs
        run: pnpm openapi:generate

      - name: Install oasdiff
        env:
          OASDIFF_VERSION: 1.11.10
          # sha256 of oasdiff_1.11.10_linux_amd64.tar.gz - verify when bumping:
          # https://github.com/oasdiff/oasdiff/releases
          OASDIFF_SHA256: 6d5880efb3422401f14c85f3c1347d6c41de3e4ea7c04e3ca7dc5c8f452e8ba2 # pragma: allowlist secret
        run: |
          curl -fsSL -o oasdiff.tar.gz \
            "https://github.com/oasdiff/oasdiff/releases/download/v${OASDIFF_VERSION}/oasdiff_${OASDIFF_VERSION}_linux_amd64.tar.gz"
          echo "${OASDIFF_SHA256}  oasdiff.tar.gz" | sha256sum -c -
          tar -xzf oasdiff.tar.gz oasdiff
          mkdir -p "$HOME/.local/bin"
          install -m 0755 oasdiff "$HOME/.local/bin/oasdiff"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"   # PATH applies from the NEXT step
          rm -f oasdiff oasdiff.tar.gz
          "$HOME/.local/bin/oasdiff" --version

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ secrets.ROLE_TO_ASSUME }}
          aws-region: us-east-1 # bucket region
          role-session-name: oasdiff-${{ github.run_id }}

      - name: Check for breaking changes
        run: pnpm exec tsx scripts/checkOpenapiBreaking.ts
