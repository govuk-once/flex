name: Quality Checks

on:
  workflow_call:
    inputs:
      AWS_REGION:
        description: "AWS Region to deploy to"
        type: string
      STAGE:
        description: "Development stage"
        type: string
        required: true
    secrets:
      ROLE_TO_ASSUME:
        description: "AWS deployment role to assume"
        required: true
      SONAR_TOKEN_FLEX:
        description: "SonarQube FLEX token"
        required: true
      SONAR_URL:
        description: "SonarQube URL"
        required: true

jobs:
  hygiene:
    name: Hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      actions: read # required by nrwl/nx-set-shas to find the last successful workflow run on main

    steps:
      - name: Checkout repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Cache pip dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Cache pre-commit environments
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/pre-commit
          key: ${{ runner.os }}-pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Install dependencies
        run: |
          python3 -m pip install pre-commit
          pnpm install --frozen-lockfile

      - name: Run Hygiene & Security Checks
        run: pre-commit run --all-files --show-diff-on-failure

      - name: NX - set SHAs
        uses: nrwl/nx-set-shas@afb73a62d26e41464e9254689e1fd6122ee683c1 # v5.0.1

      - name: Cache NX
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .nx/cache
          key: ${{ runner.os }}-nx-hygiene-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-nx-hygiene-${{ hashFiles('pnpm-lock.yaml') }}-
            ${{ runner.os }}-nx-hygiene-

      - name: Lint
        run: pnpm run lint

      - name: Type Check
        run: pnpm run tsc

      - name: Validate domain integration routes
        run: pnpm run validate:integrations

  sonarScan:
    name: SonarQube
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      actions: read # required by nrwl/nx-set-shas to find the last successful workflow run on main

    steps:
      - name: Checkout repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: NX - set SHAs
        uses: nrwl/nx-set-shas@afb73a62d26e41464e9254689e1fd6122ee683c1 # v5.0.1

      - name: Cache NX
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .nx/cache
          key: ${{ runner.os }}-nx-sonar-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-nx-sonar-${{ hashFiles('pnpm-lock.yaml') }}-
            ${{ runner.os }}-nx-sonar-

      - name: Unit Tests
        env:
          AWS_REGION: eu-west-2
          AWS_DEFAULT_REGION: eu-west-2
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test # pragma: allowlist secret
        run: pnpm exec nx affected --target=test --run --coverage --skip-nx-cache

      - name: Generate report for SonarQube
        run: pnpm run lint:report || true

      - name: Cache SonarQube scanner
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Run SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_FLEX }}
          SONAR_HOST_URL: ${{ secrets.SONAR_URL }}

  security:
    name: Security
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      id-token: write # OIDC for AWS
      contents: read
      actions: read # required by nrwl/nx-set-shas to find the last successful workflow run on main
    env:
      STAGE: ${{ inputs.STAGE }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Cache pip dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-checkov-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python3 -m pip install checkov
          pnpm install --frozen-lockfile

      - name: NX - set SHAs
        uses: nrwl/nx-set-shas@afb73a62d26e41464e9254689e1fd6122ee683c1 # v5.0.1

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v5.1.1
        with:
          role-to-assume: ${{ secrets.ROLE_TO_ASSUME }}
          aws-region: ${{ inputs.AWS_REGION }}
          role-session-name: ${{ github.run_id }}

      - name: Infrastructure as Code (IaC) Linting with checkov
        run: pnpm run checkov

      - name: Run Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
          license-check: false
          base-ref: ${{ github.event.pull_request.base.sha || 'main' }}
          head-ref: ${{ github.event.pull_request.head.sha || github.ref }}
          show-openssf-scorecard: false
