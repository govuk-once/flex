name: Performance Tests

on:
  workflow_dispatch:
    inputs:
      STAGE:
        description: "Target stage"
        required: true
        type: choice
        default: development
        options:
          - development
          - staging
      AWS_REGION:
        description: "AWS region"
        required: true
        type: string
        default: eu-west-2

permissions:
  id-token: write
  contents: read

jobs:
  performance:
    name: Performance Tests (${{ inputs.STAGE }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.STAGE }}
    env:
      STAGE: ${{ inputs.STAGE }}
      AWS_REGION: ${{ inputs.AWS_REGION }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"

      - name: Install dependencies
        run: |
          npm install -g pnpm@latest-10
          pnpm install

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@bc9489585819302995bb108bbd899b7975f40303 # v5.1.1
        with:
          role-to-assume: ${{ inputs.STAGE == 'staging' && secrets.STAGING_DEPLOYMENT_ROLE || secrets.DEV_DEPLOYMENT_ROLE }}
          aws-region: ${{ inputs.AWS_REGION }}
          role-session-name: ${{ github.run_id }}

      - name: Fetch BASE_URL from SSM
        run: |
          BASE_URL=$(aws ssm get-parameter \
            --name "/${{ inputs.STAGE }}/flex/apigw/public/app-root" \
            --query "Parameter.Value" \
            --output text)
          echo "BASE_URL=$BASE_URL" >> $GITHUB_ENV

      - name: Run todos-list scenario
        continue-on-error: true
        working-directory: tests/performance
        run: artillery run --config cloudwatch.config.yml --output results/todos-list.json scenarios/todos-list.yml

      - name: Run todos-get scenario
        continue-on-error: true
        working-directory: tests/performance
        run: artillery run --config cloudwatch.config.yml --output results/todos-get.json scenarios/todos-get.yml

      - name: Run todos-post scenario
        continue-on-error: true
        working-directory: tests/performance
        run: artillery run --config cloudwatch.config.yml --output results/todos-post.json scenarios/todos-post.yml

      - name: Generate HTML reports
        continue-on-error: true
        working-directory: tests/performance
        run: pnpm report

      - name: Upload results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: performance-results-${{ inputs.STAGE }}-${{ github.run_id }}
          path: tests/performance/results/**
          retention-days: 30
