name: Performance Tests

on:
  workflow_dispatch:
    inputs:
      STAGE:
        description: "Target stage"
        required: true
        type: choice
        default: development
        options:
          - development
          - staging
      AWS_REGION:
        description: "AWS region"
        required: true
        type: string
        default: eu-west-2

jobs:
  performance:
    name: Performance Tests (${{ inputs.STAGE }})
    permissions:
      id-token: write
      contents: read
    runs-on: ubuntu-latest
    environment: ${{ inputs.STAGE }}
    env:
      STAGE: ${{ github.event.inputs.STAGE || 'development' }}
      AWS_REGION: ${{ github.event.inputs.AWS_REGION || 'eu-west-2' }}
    strategy:
      matrix:
        scenario: [user-upsert, user-get, user-settings]

    steps:
      - name: Checkout repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ inputs.STAGE == 'staging' && secrets.STAGING_DEPLOYMENT_ROLE || secrets.DEV_DEPLOYMENT_ROLE }}
          aws-region: ${{ inputs.AWS_REGION }}
          role-session-name: ${{ github.run_id }}

      - name: Fetch BASE_URL from SSM
        run: |
          DOMAIN_NAME=$(aws ssm get-parameter \
            --name "/infra/dns/hostedzonename" \
            --query "Parameter.Value" \
            --output text)

          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "Detected Pull Request. Prepending PR number to domain."
            FULL_URL="https://${{ inputs.STAGE }}.${DOMAIN_NAME}"
          else
            echo "Detected Manual/Branch run. Using persistent domain."
            FULL_URL="https://${DOMAIN_NAME}"
          fi

          echo "BASE_URL=$FULL_URL" >> $GITHUB_ENV

      - name: Run scenario
        continue-on-error: true
        working-directory: tests/performance
        run: pnpm test:${{ matrix.scenario }}

      - name: Upload JSON result
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: results-${{ matrix.scenario }}
          path: tests/performance/results/${{ matrix.scenario }}.json

  generate-report:
    needs: performance
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download All Results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: tests/performance/results
          pattern: results-*
          merge-multiple: true #

      - name: Generate HTML reports
        continue-on-error: true
        working-directory: tests/performance
        run: pnpm report

      - name: Upload Combined Report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: performance-results-${{ inputs.STAGE }}-${{ github.run_id }}
          path: |
            tests/performance/results/*.json
            tests/performance/results/*.html
          retention-days: 30
