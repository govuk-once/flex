name: Continuous Deployment

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  qualityChecks:
    name: Quality Checks
    uses: ./.github/workflows/_quality-checks.yml
    permissions:
      id-token: write
      contents: read
      actions: read # required by nrwl/nx-set-shas to find the last successful workflow run on main
    with:
      AWS_REGION: "eu-west-2"
      STAGE: "development"
    secrets:
      ROLE_TO_ASSUME: ${{ secrets.DEV_DEPLOYMENT_ROLE }}
      SONAR_TOKEN_FLEX: ${{ secrets.SONAR_TOKEN_FLEX }}
      SONAR_URL: ${{ secrets.SONAR_URL }}

  release:
    name: Release
    needs: qualityChecks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: semantic-release
      cancel-in-progress: false
    permissions:
      contents: write
      id-token: write
    outputs:
      released: ${{ steps.semantic.outputs.released }}
      version: ${{ steps.version.outputs.value }}
      type: ${{ steps.semantic.outputs.type }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Run semantic release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm run semantic:release

      - name: Resolve deployed version
        id: version
        env:
          RELEASED_VERSION: ${{ steps.semantic.outputs.version }}
        run: |
          VERSION="$RELEASED_VERSION"
          if [ -z "$VERSION" ]; then
            VERSION="$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//')"
          fi
          if [ -z "$VERSION" ]; then
            VERSION="$(git rev-parse --short HEAD)"
          fi
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Version
        if: steps.semantic.outputs.released == 'true'
        run: echo "Released version ${{ steps.version.outputs.value }} (${{ steps.semantic.outputs.type }})"

      - name: Configure AWS credentials
        if: steps.semantic.outputs.type == 'major' || steps.semantic.outputs.type == 'minor'
        continue-on-error: true
        uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
        with:
          role-to-assume: ${{ secrets.DEV_DEPLOYMENT_ROLE }}
          aws-region: "eu-west-2"
          role-session-name: ${{ github.run_id }}

      - name: Notify Slack
        if: steps.semantic.outputs.type == 'major' || steps.semantic.outputs.type == 'minor'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.semantic.outputs.version }}
          TITLE: "Flex ${{ steps.semantic.outputs.type }} release: v${{ steps.semantic.outputs.version }}"
          URL: https://github.com/${{ github.repository }}/releases/tag/v${{ steps.semantic.outputs.version }}
        run: |
          MESSAGE=$(gh release view "v${VERSION}" --json body --jq .body \
            | pnpm exec tsx scripts/buildReleaseNotification.ts)

          TOPIC_ARN=$(aws ssm get-parameter \
            --name "/development/flex/topic/release-notifications" \
            --query "Parameter.Value" --output text)

          aws sns publish --topic-arn "$TOPIC_ARN" --message "$MESSAGE"

  deployDev:
    name: Deploy to Development
    needs: [qualityChecks, release]
    uses: ./.github/workflows/_build-deploy.yml
    permissions:
      id-token: write
      contents: read
    with:
      AWS_REGION: "eu-west-2"
      STAGE: "development"
    secrets:
      ROLE_TO_ASSUME: ${{ secrets.DEV_DEPLOYMENT_ROLE }}

  moduleE2EDev:
    name: Module E2E (Development)
    needs: deployDev
    uses: ./.github/workflows/_moduleE2E.yml
    permissions:
      id-token: write
      contents: read
    with:
      AWS_REGION: "eu-west-2"
      STAGE: "development"
    secrets:
      ROLE_TO_ASSUME: ${{ secrets.DEV_DEPLOYMENT_ROLE }}

  deployStaging:
    name: Deploy to Staging
    needs: deployDev
    uses: ./.github/workflows/_build-deploy.yml
    permissions:
      id-token: write
      contents: read
    with:
      AWS_REGION: "eu-west-2"
      STAGE: "staging"
    secrets:
      ROLE_TO_ASSUME: ${{ secrets.STAGING_DEPLOYMENT_ROLE }}

  notifyStaging:
    name: Notify Staging Deployment
    needs: [release, deployStaging]
    uses: ./.github/workflows/_notify-deployment.yml
    permissions:
      id-token: write
      contents: read
    with:
      ENVIRONMENT: staging
      VERSION: ${{ needs.release.outputs.version }}
    secrets:
      ROLE_TO_ASSUME: ${{ secrets.DEV_DEPLOYMENT_ROLE }}

  moduleE2EStaging:
    name: Module E2E (Staging)
    needs: deployStaging
    uses: ./.github/workflows/_moduleE2E.yml
    permissions:
      id-token: write
      contents: read
    with:
      AWS_REGION: "eu-west-2"
      STAGE: "staging"
    secrets:
      ROLE_TO_ASSUME: ${{ secrets.STAGING_DEPLOYMENT_ROLE }}

  deployProd:
    name: Deploy to Production
    needs: deployStaging
    uses: ./.github/workflows/_build-deploy.yml
    permissions:
      id-token: write
      contents: read
    with:
      AWS_REGION: "eu-west-2"
      STAGE: "production"
    secrets:
      ROLE_TO_ASSUME: ${{ secrets.PROD_DEPLOYMENT_ROLE }}

  notifyProd:
    name: Notify Production Deployment
    needs: [release, deployProd]
    uses: ./.github/workflows/_notify-deployment.yml
    permissions:
      id-token: write
      contents: read
    with:
      ENVIRONMENT: production
      VERSION: ${{ needs.release.outputs.version }}
    secrets:
      ROLE_TO_ASSUME: ${{ secrets.DEV_DEPLOYMENT_ROLE }}
