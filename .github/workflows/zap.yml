name: ZAP API scan

on:
  workflow_run:
    workflows: [Continuous Deployment]
    types:
      - completed
  workflow_dispatch:

permissions:
  id-token: write      # Required for AWS OIDC
  contents: read
  security-events: write # Required for SARIF upload

jobs:
  zap_scan:
      if: |
        github.event_name == 'workflow_dispatch' ||
        github.event.workflow_run.conclusion == 'success'
      runs-on: ubuntu-latest
      name: ⚡️ Zap staging
      timeout-minutes: 30
      steps:
        - name: Checkout
          uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
          with:
              #ref: main
              ref: ${{ github.ref }}
              fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis

        - name: Configure AWS credentials
          uses: aws-actions/configure-aws-credentials@ef734cca817839d2dcb4b1e3a7118492ebb4df39 # v5.1.1
          with:
            role-to-assume: ${{ secrets.DEV_DEPLOYMENT_ROLE  }}
            aws-region: 'eu-west-2'
            role-session-name: ${{ github.run_id }}

        - name: Setup node
          uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
          with:
            node-version-file: ".nvmrc"

        - name: Install dependencies
          run: |
            npm install -g pnpm@latest-10
            pnpm install

        - name: Generate JWT
          env:
            STAGE: 'development'
          run: pnpm dastSetup

        - name: Verify auth header
          run: |
            if [ -n "$ZAP_AUTH_HEADER_VALUE" ]; then
              echo "Success: Auth header is available."
            else
              echo "Failure: Auth header is missing!"
              exit 1
            fi

        - name: ZAP Scan
          uses: zaproxy/action-api-scan@5158fe4d9d8fcc75ea204db81317cce7f9e5453d # v0.10.0
          with:
              token: ${{ secrets.GITHUB_TOKEN }}
              docker_name: 'ghcr.io/zaproxy/zaproxy:stable'
              format: openapi
              target: ./.zap/merged-openapi.json
              rules_file_name: './.zap/rules.tsv'
              # URL can't have trailing slash
              # Options https://github.com/zaproxy/zaproxy/blob/255a7b8e9cc923506a61367f935ae5aa7afdd811/docker/zap-api-scan.py#L87
              cmd_options: >-
                -a -O ${{ secrets.DEVELOPMENT_API_URL }}
                -z "-config format.sarif=true -config report.sarif=/zap/wrk/report.sarif"
              allow_issue_writing: false # We don't want to create Github issues for now

        #DEBUG ONLY - REMOVE
        - name: List Files for Debugging
          run: |
            echo "Searching for any sarif files in the entire workspace..."
            find . -name "*.sarif"

        - name: Upload to Security Tab
          if: always() # Upload even if vulnerabilities are found
          uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4.35.4
          with:
            sarif_file: 'report.sarif'
            category: 'owasp-zap'

  workflow_fail:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    steps:
        - run: echo "❌ Continuous Deployment workflow failed"
