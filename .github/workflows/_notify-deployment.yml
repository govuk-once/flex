on:
  workflow_call:
    inputs:
      ENVIRONMENT:
        description: "Environment that was deployed (e.g. development, staging, production)"
        required: true
        type: string
      VERSION:
        description: "Version that was deployed"
        required: true
        type: string
      STATUS:
        description: "Outcome of the deployment (success or failure)"
        required: false
        type: string
        default: "success"
    secrets:
      ROLE_TO_ASSUME:
        description: "Dev-account role; the release topic lives in the development account"
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  notify:
    name: Notify deployment
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Configure AWS credentials
        continue-on-error: true
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ secrets.ROLE_TO_ASSUME }}
          aws-region: "eu-west-2"
          role-session-name: ${{ github.run_id }}

      - name: Publish deployment notification
        # A failed notification must not fail the pipeline
        continue-on-error: true
        env:
          ENVIRONMENT: ${{ inputs.ENVIRONMENT }}
          VERSION: ${{ inputs.VERSION }}
          STATUS: ${{ inputs.STATUS }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          TOPIC_ARN=$(aws ssm get-parameter \
            --name "/development/flex/topic/release-notifications" \
            --query "Parameter.Value" --output text)

          if [ "$STATUS" = "failure" ]; then
            TITLE="Flex deployment failed: v${VERSION} to ${ENVIRONMENT}"
            DESC=$(printf 'Deployment of *v%s* to *%s* failed.\n\n<%s|View workflow run>' \
              "$VERSION" "$ENVIRONMENT" "$RUN_URL")
          else
            TITLE="Flex deployed: v${VERSION} to ${ENVIRONMENT}"
            DESC="Version *v${VERSION}* has been deployed to *${ENVIRONMENT}*."
          fi

          MESSAGE=$(jq -n \
            --arg title "$TITLE" \
            --arg desc "$DESC" \
            '{
              version: "1.0",
              source: "custom",
              content: {
                textType: "client-markdown",
                title: $title,
                description: $desc
              }
            }')

          aws sns publish --topic-arn "$TOPIC_ARN" --message "$MESSAGE"
