name: Quality Checks

on:
  workflow_call:
    inputs:
      AWS_REGION:
        description: "AWS Region to deploy to"
        type: string
      STAGE:
        description: "Development stage"
        type: string
        required: true
    secrets:
      ROLE_TO_ASSUME:
        description: "AWS deployment role to assume"
        required: true
      SONAR_TOKEN_FLEX:
        description: "SonarQube FLEX token"
        required: true
      SONAR_URL:
        description: "SonarQube URL"
        required: true

jobs:
  qualityChecks:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      id-token: write # Required for OIDC authentication with AWS
    env:
      STAGE: ${{ inputs.STAGE }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis

      - name: Setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"

      - name: Install dependencies
        run: |
          python3 -m pip install semgrep pre-commit checkov
          npm install -g pnpm@latest-10
          pnpm install

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: ${{ secrets.ROLE_TO_ASSUME }}
          aws-region: ${{ inputs.AWS_REGION }}
          role-session-name: ${{ github.run_id }}

      - name: Run Hygiene & Security Checks
        run: SKIP=semgrep pre-commit run --all-files --show-diff-on-failure

      - name: NX - set SHAs
        uses: nrwl/nx-set-shas@afb73a62d26e41464e9254689e1fd6122ee683c1 # v5.0.1

      - name: Lint
        run: pnpm run lint

      - name: Generate report for SonarQube
        run: pnpm run lint:report || true

      - name: Type Check
        run: pnpm run tsc

      - name: Generate OpenAPI docs
        run: pnpm openapi:generate

      - name: Verify OpenAPI specs are up to date
        run: |
          git diff --exit-code docs/specs/ || {
            echo "::error::docs/specs/ is out of date — run 'pnpm openapi:generate' and commit"
            exit 1
          }

      - name: Unit Tests
        run: pnpm exec nx run-many --target=test --all --run --coverage

      - name: Infrastructure as Code (IaC) Linting with checkov
        run: pnpm run checkov

      - name: Run SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_FLEX }}
          SONAR_HOST_URL: ${{ secrets.SONAR_URL }}

      - name: Run Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high # Will fail on newly introduced vulnerabilities
          license-check: false
          base-ref: ${{ github.event.pull_request.base.sha || 'main' }}
          head-ref: ${{ github.event.pull_request.head.sha || github.ref }}
          show-openssf-scorecard: false
