sonar.organization=govuk-once
sonar.projectKey=govuk-once_flex

# relative paths to source directories. More details and properties are described
# at https://docs.sonarsource.com/sonarqube-cloud/advanced-setup/analysis-scope/
sonar.sources=domains, libs, platform

# treat the e2e folder and all colocated unit tests as test code
sonar.tests=tests, domains, libs, platform
sonar.test.inclusions=**/*.test.ts,**/*.spec.ts,**/__mocks__/**,**/__tests__/**

sonar.qualitygate.wait=true
sonar.typescript.tsconfigPaths=domains/*/tsconfig.json,libs/*/tsconfig.json,platform/**/tsconfig.json,tests/e2e/tsconfig.json
sonar.exclusions=**/dist/**,**/coverage/**,**/.nx/**,**/cdk.out/**
# domains/example is a reference implementations for domain authors,
# not production logic — coverage requirements create maintenance burden with no safety gain.
#
# domains/*/domain.config.ts are pure CDK/infra config declarations with no testable logic.
#
# platform/domains/*/src/client/** are thin HTTP wiring with no branching logic;
# behaviour is covered by executor and e2e tests.
#
# libs/utils/src/openapi/** and libs/utils/src/schemas/domain/** are OpenAPI doc generation
# helpers, not production application logic.
sonar.coverage.exclusions=platform/infra/**,\
  libs/cli/**,\
  libs/config/**,\
  libs/testing/**,\
  domains/example/**,\
  domains/local-council/**,\
  domains/*/domain.config.ts,\
  platform/domains/*/src/client/**,\
  libs/utils/src/openapi/**,\
  libs/utils/src/schemas/domain/**,\
  **/schemas/**

sonar.javascript.lcov.reportPaths=domains/*/coverage/lcov.info,libs/*/coverage/lcov.info,platform/domains/*/coverage/lcov.info,platform/shared/coverage/lcov.info

sonar.javascript.node.maxspace=8192

sonar.eslint.reportPaths=eslint-report.json

# List all Sonar rules that should be accepted (e.g. false positive, already covered by eslint)
sonar.issue.ignore.multicriteria=infra,cli
# Accepted: CDK constructs register via constructor side-effect
sonar.issue.ignore.multicriteria.infra.ruleKey=typescript:S1848
sonar.issue.ignore.multicriteria.infra.resourceKey=platform/infra/flex/src/**
# Accepted: Provider context values dont need useMemo
sonar.issue.ignore.multicriteria.cli.ruleKey=typescript:S6481
sonar.issue.ignore.multicriteria.cli.resourceKey=libs/cli/src/**
